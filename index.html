      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

      }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);

    // Parse the template and swap the root element. Scripts inserted via

    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

election */\n.shift-mode-close .day-btn.selected { background: #fde8e3; border-color: #E8826A; color: #c0502a; font-weight: bold; }\n\n/* ── Shift time inputs ── */\n.shift-time-type-row {\n  display: flex;\n  gap: 14px;\n  margin-bottom: 8px;\n}\n.shift-radio-option {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  cursor: pointer;\n  font-size: 12px;\n  color: #444;\n}\n.shift-radio-option input[type=radio] {\n  accent-color: #5b8fcc;\n  width: 14px;\n  height: 14px;\n  cursor: pointer;\n}\n.shift-time-inputs {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.shift-time-inputs.hidden { display: none; }\n.shift-time-inputs input[type=time] {\n  border: 1px solid #d0d0d0;\n  border-radius: 5px;\n  padding: 7px 10px;\n  font-size: 13px;\n  font-family: inherit;\n  color: #333;\n  background: #fff;\n  width: 110px;\n}\n.shift-time-inputs input[type=time]:focus { outline: none; border-color: #5b8fcc; }\n.shift-time-inputs .time-sep { font-size: 12px; color: #aaa; }\n\n/* ── Shift panes ── */\n.shift-pane { display: none; }\n.shift-pane.active { display: block; }\n\n/* ── modal field label (reuse) ── */\n.shift-field-label {\n  font-size: 11px;\n  font-weight: bold;\n  color: #666;\n  margin-bottom: 5px;\n  display: block;\n}\n.shift-section-divider { height: 1px; background: #f0f0f0; margin: 4px 0 14px; }\n\n/* Conditional time field (legacy clinic modal) */\n.time-conditional { display: none; }\n.time-conditional.show { display: block; }\n.modal-overlay {\n  display: none;\n  position: fixed;\n  inset: 0;\n  background: rgba(0,0,0,0.45);\n  z-index: 200;\n  align-items: center;\n  justify-content: center;\n}\n.modal-overlay.open { display: flex; }\n.modal-box {\n  background: #fff;\n  border-radius: 8px;\n  padding: 24px;\n  width: 400px;\n  box-shadow: 0 8px 32px rgba(0,0,0,0.18);\n}\n.modal-box h3 { font-size: 15px; margin-bottom: 18px; color: #222; }\n.modal-field { margin-bottom: 13px; }\n.modal-field label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }\n.modal-field input,\n.modal-field select {\n  width: 100%;\n  border: 1px solid #ccc;\n  padding: 6px 9px;\n  border-radius: 4px;\n  font-size: 13px;\n  font-family: inherit;\n}\n.date-range-row { display: flex; align-items: center; gap: 8px; }\n.date-range-row input { flex: 1; }\n.date-range-row span { font-size: 12px; color: #888; white-space: nowrap; }\n.modal-actions {\n  display: flex;\n  gap: 8px;\n  justify-content: flex-end;\n  margin-top: 20px;\n}\n.btn-modal-ok {\n  background: #E8826A;\n  color: #fff;\n  border: none;\n  padding: 8px 22px;\n  border-radius: 4px;\n  cursor: pointer;\n  font-size: 13px;\n  font-family: inherit;\n}\n.btn-modal-cancel {\n  background: #ccc;\n  color: #333;\n  border: none;\n  padding: 8px 16px;\n  border-radius: 4px;\n  cursor: pointer;\n  font-size: 13px;\n  font-family: inherit;\n}\n\n/* Edit banner */\n.edit-banner {\n  display: none;\n  background: #fef9e7;\n  border: 1px solid #f0c040;\n  border-radius: 5px;\n  padding: 8px 14px;\n  font-size: 12px;\n  color: #886600;\n  margin-bottom: 12px;\n}\nbody.edit-mode .edit-banner { display: block; }\n\n/* 現在適用中パターン表示 */\n.current-pattern-label {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 11px;\n  color: #5b8fcc;\n  background: #edf3fb;\n  border: 1px solid #b8d0ee;\n  border-radius: 12px;\n  padding: 3px 10px 3px 8px;\n}\n.current-pattern-label span { font-weight: bold; }\n.post-save-banner {\n  display: none;\n  background: #f0f5fb;\n  border: 1px solid #b8d0ee;\n  border-radius: 5px;\n  padding: 10px 16px;\n  font-size: 12px;\n  color: #2a5a99;\n  margin-bottom: 12px;\n  align-items: center;\n  gap: 12px;\n  flex-wrap: wrap;\n}\n.post-save-banner.show { display: flex; }\n.post-save-banner-text { flex: 1; min-width: 160px; }\n.post-save-banner-text strong { font-weight: bold; }\n.post-save-banner-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }\n.post-save-banner input[type=text] {\n  border: 1px solid #b0c8e8;\n  border-radius: 4px;\n  padding: 5px 10px;\n  font-size: 12px;\n  font-family: inherit;\n  color: #333;\n  width: 200px;\n  background: #fff;\n}\n.btn-banner-save {\n  background: #5b8fcc;\n  color: #fff;\n  border: none;\n  padding: 6px 14px;\n  border-radius: 4px;\n  font-size: 12px;\n  cursor: pointer;\n  font-family: inherit;\n  white-space: nowrap;\n}\n.btn-banner-skip {\n  background: none;\n  border: none;\n  font-size: 11px;\n  color: #aaa;\n  cursor: pointer;\n  font-family: inherit;\n  white-space: nowrap;\n  padding: 4px 2px;\n}\n.btn-banner-skip:hover { color: #888; }\n.btn-load-pattern {\n  background: #fff;\n  color: #5b8fcc;\n  border: 1px solid #5b8fcc;\n  padding: 7px 16px;\n  border-radius: 4px;\n  font-size: 13px;\n  cursor: pointer;\n  display: none;\n  align-items: center;\n  gap: 6px;\n  font-family: inherit;\n  white-space: nowrap;\n  transition: background 0.15s;\n}\n.btn-load-pattern:hover { background: #f0f5fb; }\nbody.edit-mode .btn-load-pattern { display: inline-flex; }\n\n/* ── パターンライブラリ モーダル ── */\n.pattern-modal-box {\n  background: #fff;\n  border-radius: 10px;\n  width: 540px;\n  max-width: 96vw;\n  box-shadow: 0 12px 40px rgba(0,0,0,0.18);\n  overflow: hidden;\n}\n.pattern-modal-header {\n  padding: 18px 20px 14px;\n  border-bottom: 1px solid #ebebeb;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.pattern-modal-header h3 { font-size: 15px; color: #222; }\n.pattern-modal-header span { font-size: 11px; color: #aaa; }\n.btn-close-modal {\n  background: none;\n  border: none;\n  font-size: 20px;\n  color: #bbb;\n  cursor: pointer;\n  line-height: 1;\n  padding: 0 2px;\n}\n.btn-close-modal:hover { color: #666; }\n\n.pattern-list {\n  padding: 14px 20px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  max-height: 400px;\n  overflow-y: auto;\n}\n\n.pattern-card {\n  border: 1px solid #e0e0e0;\n  border-radius: 7px;\n  padding: 13px 16px;\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  cursor: pointer;\n  transition: border-color 0.15s, background 0.15s;\n  background: #fff;\n}\n.pattern-card:hover { border-color: #5b8fcc; background: #f5f8fd; }\n.pattern-card.selected { border-color: #5b8fcc; background: #edf3fb; }\n\n.pattern-icon {\n  width: 36px;\n  height: 36px;\n  border-radius: 8px;\n  background: #e8f0fa;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n  font-size: 17px;\n}\n\n.pattern-info { flex: 1; min-width: 0; }\n.pattern-name { font-size: 13px; font-weight: bold; color: #222; margin-bottom: 3px; }\n.pattern-meta { font-size: 11px; color: #888; display: flex; gap: 10px; flex-wrap: wrap; }\n.pattern-meta-item { display: flex; align-items: center; gap: 3px; }\n.pattern-date { font-size: 10px; color: #bbb; white-space: nowrap; }\n\n.pattern-check {\n  width: 20px;\n  height: 20px;\n  border-radius: 50%;\n  border: 2px solid #ccc;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n  transition: border-color 0.15s, background 0.15s;\n}\n.pattern-card.selected .pattern-check {\n  border-color: #5b8fcc;\n  background: #5b8fcc;\n}\n.pattern-check-inner {\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  background: #fff;\n  opacity: 0;\n  transition: opacity 0.15s;\n}\n.pattern-card.selected .pattern-check-inner { opacity: 1; }\n\n.pattern-modal-footer {\n  padding: 14px 20px;\n  border-top: 1px solid #ebebeb;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 10px;\n}\n.pattern-modal-footer-left { font-size: 11px; color: #bbb; }\n.pattern-modal-footer-right { display: flex; gap: 8px; }\n.btn-apply-pattern {\n  background: #5b8fcc;\n  color: #fff;\n  border: none;\n  padding: 8px 22px;\n  border-radius: 4px;\n  font-size: 13px;\n  cursor: pointer;\n  font-family: inherit;\n  opacity: 0.4;\n  pointer-events: none;\n  transition: opacity 0.15s;\n}\n.btn-apply-pattern.ready { opacity: 1; pointer-events: auto; }\n.btn-cancel-pattern {\n  background: #f0f0f0;\n  color: #555;\n  border: none;\n  padding: 8px 16px;\n  border-radius: 4px;\n  font-size: 13px;\n  cursor: pointer;\n  font-family: inherit;\n}\n\n/* 適用後トースト */\n/* ── 横スクロール UI ── */\n.search-result-outer {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n}\n.scroll-hint {\n  display: none;\n  align-items: center;\n  justify-content: center;\n  gap: 5px;\n  font-size: 11px;\n  color: #E8826A;\n  font-weight: 500;\n  padding: 4px 0 2px;\n  animation: hint-pulse 2s ease-in-out 0.6s 2 forwards;\n}\n@keyframes hint-pulse {\n  0%,100% { opacity: 1; }\n  50%      { opacity: 0.4; }\n}\n.search-scroll-wrap {\n  display: flex;\n  align-items: stretch;\n  gap: 0;\n  position: relative;\n}\n.scroll-arrow {\n  flex-shrink: 0;\n  width: 30px;\n  background: #fff;\n  border: 1px solid #ddd;\n  color: #888;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  transition: background 0.15s, color 0.15s, border-color 0.15s;\n  z-index: 2;\n}\n.scroll-arrow:hover { background: #fdf1ee; border-color: #E8826A; color: #E8826A; }\n.scroll-arrow:disabled { opacity: 0.25; cursor: default; pointer-events: none; }\n.scroll-arrow-left  { border-radius: 6px 0 0 6px; border-right: none; }\n.scroll-arrow-right { border-radius: 0 6px 6px 0; border-left: none; }\n.search-scroll-wrap .search-result-wrap {\n  border-radius: 0;\n  flex: 1;\n  min-width: 0;\n}\n\n/* ── 決済状況バッジ ── */\n.td-payment { white-space: nowrap; }\n.pay-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 5px;\n  font-size: 11px;\n  font-weight: bold;\n  padding: 3px 8px;\n  border-radius: 4px;\n  white-space: nowrap;\n}\n.pay-amount {\n  font-weight: normal;\n  font-size: 11px;\n  opacity: 0.85;\n}\n.pay-paid     { background: #e8f5ee; color: #2a7a4e; border: 1px solid #b8dfc9; }\n.pay-unpaid   { background: #fff8e6; color: #8a6200; border: 1px solid #f0d080; }\n.pay-cancelled { background: #f2f2f2; color: #888; border: 1px solid #ddd; }\n.pay-refunded { background: #f0f4ff; color: #3455a4; border: 1px solid #b8c8f0; }\n\n.apply-toast {\n  position: fixed;\n  bottom: 28px;\n  left: 50%;\n  transform: translateX(-50%) translateY(10px);\n  background: #222;\n  color: #fff;\n  padding: 10px 22px;\n  border-radius: 20px;\n  font-size: 13px;\n  opacity: 0;\n  pointer-events: none;\n  transition: opacity 0.25s, transform 0.25s;\n  z-index: 400;\n  white-space: nowrap;\n}\n.apply-toast.show {\n  opacity: 1;\n  transform: translateX(-50%) translateY(0);\n}\n\u003c/style>\n\n\u003c/head>\n\u003cbody>\n\n\u003c!-- Sidebar -->\n\u003caside class=\"sidebar\" id=\"sidebar\">\n  \u003cdiv class=\"sidebar-logo\">8028 Private Salon\u003c/div>\n  \u003cbutton class=\"sidebar-toggle\" id=\"sidebarToggle\" onclick=\"toggleSidebar()\" title=\"メニューを開閉\">\n    \u003csvg id=\"toggleIcon\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      \u003cpolyline points=\"15 18 9 12 15 6\">\u003c/polyline>\n      \u003cpolyline points=\"9 18 3 12 9 6\">\u003c/polyline>\n    \u003c/svg>\n  \u003c/button>\n  \u003cnav class=\"sidebar-nav\">    \u003cbutton class=\"nav-item\" onclick=\"setNav(this); showPage('page-calendar'); switchCalTab(0); renderSearchTable(); updateSearchDateLabel();\">\n      \u003cspan class=\"nav-icon\">\n        \u003csvg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#888\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          \u003crect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\">\u003c/rect>\u003cline x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\">\u003c/line>\u003cline x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\">\u003c/line>\u003cline x1=\"3\" y1=\"10\" x2=\"21\" y2=\"10\">\u003c/line>\n        \u003c/svg>\n      \u003c/span>\n      \u003cspan class=\"nav-label\">カレンダー\u003c/span>\n    \u003c/button>\n    \u00 olor:#aaa;\">〜\u003c/span>\n          \u003cinput type=\"date\" id=\"shiftTo\" value=\"2026-04-30\" style=\"flex:1; border:1px solid #d0d0d0; border-radius:5px; padding:8px 10px; font-size:13px; font-family:inherit; color:#333;\">\n        \u003c/div>\n        \u003cdiv style=\"font-size:10px; color:#aaa; margin-top:4px;\">同日の場合は同じ日付を入力してください\u003c/div>\n      \u003c/div>\n\n      \u003c!-- 繰り返しパネル -->\n      \u003cdiv class=\"shift-pane active\" id=\"shiftPaneRepeat\">\n        \u003cdiv style=\"display:flex; flex-direction:column; gap:14px;\">\n          \u003cdiv>\n            \u003cdiv class=\"shift-field-label\">適用期間 \u003cspan style=\"color:#E8826A; font-size:10px;\">必須\u003c/span>\u003c/div>\n            \u003cdiv style=\"display:flex; align-items:center; gap:8px;\">\n              \u003cinput type=\"date\" id=\"repeatFrom\" value=\"2026-04-01\" style=\"flex:1; border:1px solid #d0d0d0; border-radius:5px; padding:8px 10px; font-size:13px; font-family:inherit; color:#333;\">\n              \u003cspan style=\"font-size:12px; color:#aaa;\">〜\u003c/span>\n              \u003cinput type=\"date\" id=\"repeatTo\" value=\"2026-09-30\" style=\"flex:1; border:1px solid #d0d0d0; border-radius:5px; padding:8px 10px; font-size:13px; font-family:inherit; color:#333;\">\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv>\n            \u003cdiv class=\"shift-field-label\">対象の曜日 \u003cspan style=\"color:#E8826A; font-size:10px;\">必須\u003c/span>\u003c/div>\n            \u003cdiv class=\"day-picker\" id=\"shiftDayPicker\">\n              \u003cbutton type=\"button\" class=\"day-btn\" onclick=\"toggleDay(this)\">月\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn\" onclick=\"toggleDay(this)\">火\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn\" onclick=\"toggleDay(this)\">水\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn\" onclick=\"toggleDay(this)\">木\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn\" onclick=\"toggleDay(this)\">金\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn sat\" onclick=\"toggleDay(this)\">土\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn sun\" onclick=\"toggleDay(this)\">日\u003c/button>\n              \u003cbutton type=\"button\" class=\"day-btn hol\" onclick=\"toggleDay(this)\">祝\u003c/button>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n\n      \u003c!-- 時間帯 (共通) -->\n      \u003cdiv>\n        \u003cdiv class=\"shift-field-label\">時間帯\u003c/div>\n        \u003cdiv class=\"shift-time-type-row\">\n          \u003clabel class=\"shift-radio-option\">\n            \u003cinput type=\"radio\" name=\"shiftTimeType\" value=\"allday\" checked=\"\" onchange=\"toggleShiftTimeInput(this)\">\n            終日\n          \u003c/label>\n          \u003clabel class=\"shift-radio-option\">\n            \u003cinput type=\"radio\" name=\"shiftTimeType\" value=\"custom\" onchange=\"toggleShiftTimeInput(this)\">\n            時間帯を指定\n          \u003c/label>\n        \u003c/div>\n        \u003cdiv class=\"shift-time-inputs hidden\" id=\"shiftTimeInputs\">\n          \u003cinput type=\"time\" id=\"shiftTimeFrom\" value=\"09:00\">\n          \u003cspan class=\"time-sep\">〜\u003c/span>\n          \u003cinput type=\"time\" id=\"shiftTimeTo\" value=\"13:00\">\n        \u003c/div>\n      \u003c/div>\n\n    \u003c/div>\u003c!-- /body -->\n\n    \u003c!-- Footer -->\n    \u003cdiv style=\"padding:14px 20px 18px; border-top:1px solid #ebebeb; display:flex; justify-content:flex-end; gap:8px;\">\n      \u003cbutton class=\"btn-modal-cancel\" onclick=\"closeModal('shiftModal')\" style=\"background:#f2f2f2; color:#555; border:none; padding:9px 18px; border-radius:5px; font-size:13px; font-family:inherit; cursor:pointer;\">キャンセル\u003c/button>\n      \u003cbutton class=\"btn-modal-ok\" id=\"shiftSubmitBtn\" onclick=\"addShiftItem()\" style=\"background:#E8826A; color:#fff; border:none; padding:9px 24px; border-radius:5px; font-size:13px; font-family:inherit; cursor:pointer; font-weight:bold;\">追加する\u003c/button>\n    \u003c/div>\n  \u003c/div>\n\u003c/div>\n\n\u003cscript>\n// ── Pattern library ──\nlet selectedPatternId = null;\n\nfunction selectPattern(card) {\n  document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('selected'));\n  card.classList.add('selected');\n  selectedPatternId = card.dataset.id;\n  document.getElementById('btnApplyPattern').classList.add('ready');\n}\n\nfunction applyPattern() {\n  if (!selectedPatternId) return;\n  // 選択中のパターン名を取得\n  const selected = document.querySelector('.pattern-card.selected');\n  const name = selected ? selected.querySelector('.pattern-name').textContent : '';\n  closeModal('patternModal');\n  selectedPatternId = null;\n  document.querySelectorAll('.pattern-card').forEach(c => c.classList.remove('selected'));\n  document.getElementById('btnApplyPattern').classList.remove('ready');\n\n  // トースト\n  const toast = document.getElementById('applyToast');\n  toast.textContent = '「' + name + '」を読み込みました';\n  toast.classList.add('show');\n  setTimeout(() => {\n    toast.classList.remove('show');\n    toast.textContent = 'パターンを読み込みました';\n  }, 2200);\n}\n\n// ── Sidebar toggle ──\nlet sidebarOpen = true;\nfunction toggleSidebar() {\n  sidebarOpen = !sidebarOpen;\n  const sidebar = document.getElementById('sidebar');\n  const shell   = document.getElementById('layoutShell');\n  sidebar.classList.toggle('collapsed', !sidebarOpen);\n  shell.classList.toggle('sidebar-collapsed', !sidebarOpen);\n  const icon = document.getElementById('toggleIcon');\n  icon.innerHTML = sidebarOpen\n    ? '\u003cpolyline points=\"15 18 9 12 15 6\"/>\u003cpolyline points=\"9 18 3 12 9 6\"/>'\n    : '\u003cpolyline points=\"9 18 15 12 9 6\"/>\u003cpolyline points=\"15 18 21 12 15 6\"/>';\n}\nfunction setNav(btn) {\n  document.querySelectorAll('.nav-item').forEach(b => {\n    b.classList.remove('active');\n    b.querySelector('svg').setAttribute('stroke', '#888');\n  });\n  btn.classList.add('active');\n  btn.querySelector('svg').setAttribute('stroke', '#fff');\n}\n\n\n// ── Page switching ──\nfunction showPage(id) {\n  document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n}\n\nfunction openApptModal(appt, staffName) {\n  document.getElementById('apptPatient').value = appt.name;\n  document.getElementById('apptHygienist').value = staffName;\n  const d = calDate;\n  const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${WEEKDAY_LABELS[d.getDay()]})`;\n  document.getElementById('apptDateFrom').value = dateStr;\n  document.getElementById('apptDateTo').value   = dateStr;\n  document.getElementById('apptTimeFrom').value = appt.start;\n  document.getElementById('apptTimeTo').value   = appt.end;\n  if (appt.type) document.getElementById('apptMenu').value = appt.type;\n  openModal('apptModal');\n}\n\n// ── Calendar tab switching ──\nconst CAL_TAB_TITLES = ['予約検索', '衛生士別予約', 'ユニット別予約'];\nfunction switchCalTab(idx) {\n  for (let i = 0; i \u003c 3; i++) {\n    document.getElementById('calTab' + i).classList.toggle('active', i === idx);\n    document.getElementById('calPane' + i).classList.toggle('active', i === idx);\n  }\n  document.getElementById('calPageTitle').textContent = CAL_TAB_TITLES[idx];\n  if (idx === 1) buildCalendar();\n  if (idx === 0) renderSearchTable();\n}\n\n// ── 予約検索 ──\nlet searchPeriod = '1m';\nlet searchBaseDate = new Date(2026, 3, 1); // 2026/04/01 (month is 0-indexed)\nconst WD = ['日','月','火','水','木','金','土'];\n\nfunction fmtSearchDate(d) {\n  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${WD[d.getDay()]}`;\n}\n\nfunction updateSearchDateLabel() {\n  if (searchPeriod === '1m') {\n    const first = new Date(searchBaseDate.getFullYear(), searchBaseDate.getMonth(), 1);\n    const last  = new Date(searchBaseDate.getFullYear(), searchBaseDate.getMonth() + 1, 0);\n    document.getElementById('searchDateLabel').value =\n      fmtSearchDate(first) + ' 〜 ' + fmtSearchDate(last);\n  } else {\n    document.getElementById('searchDateLabel').value = fmtSearchDate(searchBaseDate);\n  }\n}\n\nfunction setSearchPeriod(p) {\n  searchPeriod = p;\n  document.getElementById('spBtn1d').classList.toggle('active', p === '1d');\n  document.getElementById('spBtn1m').classList.toggle('active', p === '1m');\n  const isDay = p === '1d';\n  document.getElementById('searchNavPrev').textContent = isDay ? '前日' : '前月';\n  document.getElementById('searchNavNext').textContent = isDay ? '翌日' : '次月';\n  updateSearchDateLabel();\n  renderSearchTable();\n}\n\nfunction shiftSearch(dir) {\n  if (searchPeriod === '1d') {\n    searchBaseDate.setDate(searchBaseDate.getDate() + dir);\n  } else {\n    searchBaseDate.setMonth(searchBaseDate.getMonth() + dir);\n  }\n  updateSearchDateLabel();\n  renderSearchTable();\n}\n\nfunction toggleSearchMode(radio) {\n  const isDate = radio.value === 'date';\n  document.getElementById('searchDateControls').style.display = isDate ? 'block' : 'none';\n  document.getElementById('searchTextControls').style.display = isDate ? 'none' : 'block';\n}\n\n// Sample appointment data\n// payment: { type: 'paid'|'unpaid'|'cancelled'|'refunded', amount?: number }\nconst SEARCH_ROWS = [\n  { cols: ['2026/04/19\\n10:00〜', '大澤明仁', '診査・メンテナンス', '衛生土堤', 'saishin.sample@gmail.com', '09044681767', '2026/04/14', 'コメントコメントコメント'], payment: { type: 'paid', amount: 15000 } },\n  { cols: ['2026/04/19\\n11:30〜', '守屋美紗', 'サリバテスト', '山田鮎子', 'moriya@example.com', '09011112222', '2026/04/15', 'コメントコメント'], payment: { type: 'paid', amount: 8800 } },\n  { cols: ['2026/04/20\\n14:00〜', '元木準彦', 'サリバ結果説明', '杉崎大翔', 'motoki@example.com', '09033334444', '2026/04/15', ''], payment: { type: 'unpaid' } },\n  { cols: ['2026/04/21\\n10:00〜', '大澤明仁', '診査・メンテナンス', '衛生土堤', 'saishin.sample@gmail.com', '09044681767', '2026/04/16', 'コメントコメントコメント'], payment: { type: 'paid', amount: 15000 } },\n  { cols: ['2026/04/21\\n11:30〜', '石田宗隆', '予防メンテナンス', '山田千尋', 'ishida@example.com', '09055556666', '2026/04/16', ''], payment: { type: 'unpaid' } },\n  { cols: ['2026/04/22\\n09:00〜', '大澤明仁', '診査・メンテナンス', '衛生土堤', 'saishin.sample@gmail.com', '09044681767', '2026/04/17', 'コメントコメント'], payment: { type: 'cancelled' } },\n  { cols: ['2026/04/22\\n10:30〜', '山田泰仁', '診査・予防メンテナンス', '山田鮎子', 'yamada@example.com', '09077778888', '2026/04/17', ''], payment: { type: 'refunded', amount: 12000 } },\n  { cols: ['2026/04/23\\n13:00〜', '守屋美紗', 'サリバテスト', '杉崎大翔', 'moriya@example.com', '09011112222', '2026/04/18', 'コメントコメントコメント'], payment: { type: 'unpaid' } },\n  { cols: ['2026/04/24\\n10:00〜', '元木準彦', '予防メンテナンス', '衛生土堤', 'motoki@example.com', '09033334444', '2026/04/19', ''], payment: { type: 'paid', amount: 9900 } },\n  { cols: ['2026/04/25\\n14:00〜', '大澤明仁', '診査・メンテナンス', '山田千尋', 'saishin.sample@gmail.com', '09044681767', '2026/04/20', 'コメントコメント'], payment: { type: 'cancelled' } },\n  { cols: ['2026/04/26\\n11:00〜', '石田宗隆', 'サリバ結果説明', '山田鮎子', 'ishida@example.com', '09055556666', '2026/04/21', ''], payment: { type: 'refunded', amount: 8800 } },\n];\n\nfunction paymentBadge(p) {\n  const fmt = n => '¥' + n.toLocaleString();\n  if (p.type === 'paid')\n    return `\u003cspan class=\"pay-badge pay-paid\">済\u003cspan class=\"pay-amount\">${fmt(p.amount)}\u003c/span>\u003c/span>`;\n  if (p.type === 'unpaid')\n    return `\u003cspan class=\"pay-badge pay-unpaid\">未\u003c/span>`;\n  if (p.type === 'cancelled')\n    return `\u003cspan class=\"pay-badge pay-cancelled\">キャンセル\u003c/span>`;\n  if (p.type === 'refunded')\n    return `\u003cspan class=\"pay-badge pay-refunded\">返金済\u003cspan class=\"pay-amount\">${fmt(p.amount)}\u003c/span>\u003c/span>`;\n  return '—';\n}\n\n// ── 横スクロールボタン ──\nfunction scrollTable(delta) {\n  const el = document.getElementById('searchResultScroll');\n  if (!el) return;\n  el.scrollBy({ left: delta, behavior: 'smooth' });\n}\n\nfunction updateScrollArrows() {\n  const el = document.getElementById('searchResultScroll');\n  const hint = document.getElementById('scrollHint');\n  if (!el) return;\n  const canScrollLeft  = el.scrollLeft > 4;\n  const canScrollRight = el.scrollLeft \u003c el.scrollWidth - el.clientWidth - 4;\n  const leftBtn  = document.getElementById('scrollLeft');\n  const rightBtn = document.getElementById('scrollRight');\n  if (leftBtn)  leftBtn.disabled  = !canScrollLeft;\n  if (rightBtn) rightBtn.disabled = !canScrollRight;\n  // ヒントはスクロール可能なときのみ表示\n  if (hint) hint.style.display = (el.scrollWidth > el.clientWidth + 4) ? 'flex' : 'none';\n}\n\nfunction initScrollArrows() {\n  const el = document.getElementById('searchResultScroll');\n  if (!el) return;\n  el.addEventListener('scroll', updateScrollArrows);\n  new ResizeObserver(updateScrollArrows).observe(el);\n  updateScrollArrows();\n}\n\nfunction renderSearchTable() {\n  const tbody = document.getElementById('searchTableBody');\n  tbody.innerHTML = '';\n  SEARCH_ROWS.forEach(({ cols, payment }) => {\n    const tr = document.createElement('tr');\n    // cols: 0=日時, 1=患者, 2=メニュー, 3=衛生士, 4=mail, 5=tel, 6=取得日, 7=備考\n    // table headers: 予約日時, 患者名, メニュー, 担当衛生士, メール, 電話, 決済状況, 予約取得日, 備考\n    const cells = [\n      `\u003ctd style=\"white-space:pre\">${cols[0]}\u003c/td>`,\n      `\u003ctd style=\"white-space:nowrap\">${cols[1]}\u003c/td>`,\n      `\u003ctd style=\"white-space:nowrap\">${cols[2]}\u003c/td>`,\n      `\u003ctd style=\"white-space:nowrap\">${cols[3]}\u003c/td>`,\n      `\u003ctd style=\"white-space:nowrap\">${cols[4]}\u003c/td>`,\n      `\u003ctd style=\"white-space:nowrap\">${cols[5]}\u003c/td>`,\n      `\u003ctd class=\"td-payment\">${paymentBadge(payment)}\u003c/td>`,\n      `\u003ctd style=\"white-space:nowrap\">${cols[6]}\u003c/td>`,\n      `\u003ctd>${cols[7]}\u003c/td>`,\n    ];\n    tr.innerHTML = cells.join('');\n    tbody.appendChild(tr);\n  });\n  setTimeout(updateScrollArrows, 50);\n}\n\n// ── Calendar page ──\nconst WEEKDAY_LABELS = ['日','月','火','水','木','金','土'];\nconst HOUR_PX = 60; // px per hour\nconst CAL_START = 9; // 9:00\nconst CAL_END   = 19; // 19:00\nconst CAL_HOURS = CAL_END - CAL_START;\n\nlet calDate = new Date('2026-04-21');\n\nconst STAFF_LIST = ['藤田篤示','筑美里','石田宗降','藤田篤示','阪本薫'];\n\n// Appointment data per staff index\nconst APPT_DATA = [\n  [ // 藤田篤示\n    { start:'10:00', end:'11:30', id:'1234', name:'守屋美紗', type:'サリバテスト/予防メンテナンス', color:'menu-b' },\n    { start:'11:30', end:'13:00', id:'1234', name:'元木準彦', type:'サリバ結果説明/予防メンテナンス', color:'menu-c' },\n    { start:'14:00', end:'15:00', id:'1234', name:'大澤明仁', type:'予防メンテナンス 60分', color:'menu-d' },\n    { start:'15:00', end:'15:30', id:'1234', name:'山田泰仁', type:'セカンドオピニオン', color:'menu-e' },\n    { start:'15:30', end:'17:00', id:'1234', name:'石田宗隆', type:'診査・予防メンテナンス', color:'menu-a' },\n  ],\n  [ // 筑美里\n    { start:'10:00', end:'11:30', id:'1234', name:'守屋美紗', type:'サリバテスト/予防メンテナンス', color:'menu-b' },\n    { start:'11:30', end:'13:00', id:'1234', name:'元木準彦', type:'サリバ結果説明/予防メンテナンス', color:'menu-c' },\n    { start:'14:00', end:'15:00', id:'1234', name:'大澤明仁', type:'予防メンテナンス 60分', color:'menu-d' },\n    { start:'15:00', end:'15:30', id:'1234', name:'山田泰仁', type:'セカンドオピニオン', color:'menu-e' },\n    { start:'15:30', end:'17:00', id:'1234', name:'石田宗隆', type:'診査・予防メンテナンス', color:'menu-a' },\n  ],\n  [ // 石田宗降\n    { start:'10:00', end:'11:30', id:'1234', name:'守屋美紗', type:'サリバテスト/予防メンテナンス', color:'menu-b' },\n    { start:'11:30', end:'13:00', id:'1234', name:'元木準彦', type:'サリバ結果説明/予防メンテナンス', color:'menu-c' },\n    { start:'14:00', end:'15:00', id:'1234', name:'大澤明仁', type:'予防メンテナンス 60分', color:'menu-d' },\n    { start:'15:00', end:'15:30', id:'1234', name:'山田泰仁', type:'セカンドオピニオン', color:'menu-e' },\n  ],\n  [ // 藤田篤示\n    { start:'10:00', end:'11:30', id:'1234', name:'守屋美紗', type:'サリバテスト/予防メンテナンス', color:'menu-b' },\n    { start:'11:30', end:'13:00', id:'1234', name:'元木準彦', type:'サリバ結果説明/予防メンテナンス', color:'menu-c' },\n    { start:'14:00', end:'15:00', id:'1234', name:'大澤明仁', type:'予防メンテナンス 60分', color:'menu-d' },\n    { start:'15:00', end:'15:30', id:'1234', name:'山田泰仁', type:'セカンドオピニオン', color:'menu-e' },\n    { start:'15:30', end:'17:00', id:'1234', name:'石田宗隆', type:'診査・予防メンテナンス', color:'menu-a' },\n  ],\n  [ // 阪本薫\n    { start:'10:00', end:'11:30', id:'1234', name:'守屋美紗', type:'サリバテスト/予防メンテナンス', color:'menu-b' },\n    { start:'11:30', end:'13:00', id:'1234', name:'元木準彦', type:'サリバ結果説明/予防メンテナンス', color:'menu-c' },\n    { start:'14:00', end:'15:00', id:'1234', name:'大澤明仁', type:'予防メンテナンス 60分', color:'menu-d' },\n    { start:'15:30', end:'17:00', id:'1234', name:'石田宗隆', type:'診査・予防メンテナンス', color:'menu-a' },\n  ],\n];\n\nfunction timeToY(timeStr) {\n  const [h, m] = timeStr.split(':').map(Number);\n  return (h - CAL_START + m / 60) * HOUR_PX;\n}\n\n// Non-bookable ranges\nconst CLOSED_RANGES = [\n  { start: 9*60,     end: 10*60   },\n  { start: 13*60,    end: 14*60   },\n  { start: 18*60+30, end: 19*60   },\n];\nfunction timeMinToY(totalMin) {\n  return (totalMin - CAL_START * 60) / 60 * HOUR_PX;\n}\n\nfunction buildCalendar() {\n  // Build time ruler\n  const ruler = document.getElementById('timeRuler');\n  ruler.innerHTML = '';\n  for (let h = CAL_START; h \u003c= CAL_END; h++) {\n    const tick = document.createElement('div');\n    tick.className = 'time-ruler-tick';\n    tick.style.top = ((h - CAL_START) * HOUR_PX) + 'px';\n    tick.innerHTML = `\u003cspan>${h}:00\u003c/span>`;\n    ruler.appendChild(tick);\n  }\n\n  // Build staff columns\n  const grid = document.getElementById('staffCalGrid');\n  // Remove old staff columns\n  grid.querySelectorAll('.staff-col').forEach(c => c.remove());\n\n  STAFF_LIST.forEach((name, si) => {\n    const col = document.createElement('div');\n    col.className = 'staff-col';\n\n    // Header\n    const hdr = document.createElement('div');\n    hdr.className = 'staff-col-header';\n    hdr.textContent = name;\n    col.appendChild(hdr);\n\n    // Body\n    const body = document.createElement('div');\n    body.className = 'staff-col-body';\n\n    // Hour lines\n    for (let h = 0; h \u003c= CAL_HOURS; h++) {\n      const line = document.createElement('div');\n      line.className = 'hour-line';\n      line.style.top = (h * HOUR_PX) + 'px';\n      body.appendChild(line);\n      if (h \u003c CAL_HOURS) {\n        const half = document.createElement('div');\n        half.className = 'hour-line half';\n        half.style.top = (h * HOUR_PX + 30) + 'px';\n        body.appendChild(half);\n      }\n    }\n\n    // Greyout non-bookable ranges\n    CLOSED_RANGES.forEach(r => {\n      const top    = timeMinToY(r.start);\n      const height = timeMinToY(r.end) - top;\n      const overlay = document.createElement('div');\n      overlay.style.cssText = `\n        position:absolute; left:0; right:0;\n        top:${top}px; height:${height}px;\n        background:repeating-linear-gradient(\n          45deg, #e8e8e8, #e8e8e8 3px, #f0f0f0 3px, #f0f0f0 9px\n        );\n        z-index:1; pointer-events:none;\n      `;\n      body.appendChild(overlay);\n    });\n\n    // Appointments\n    (APPT_DATA[si] || []).forEach(appt => {\n      const top = timeToY(appt.start);\n      const bot = timeToY(appt.end);\n      const height = bot - top - 2;\n      const el = document.createElement('div');\n      el.className = `appt ${appt.color}`;\n      el.style.top = top + 'px';\n      el.style.height = Math.max(height, 18) + 'px';\n      el.style.zIndex = '2';\n      el.innerHTML = `\n        \u003cdiv class=\"appt-time\">${appt.start}〜${appt.end}\u003c/div>\n        \u003cdiv class=\"appt-id\">${appt.id}&nbsp;\u003cspan class=\"appt-name\">${appt.name}\u003c/span>\u003c/div>\n        ${appt.type ? `\u003cdiv class=\"appt-type\">${appt.type}\u003c/div>` : ''}\n      `;\n      el.onclick = () => openApptModal(appt, name);\n      body.appendChild(el);\n    });\n\n    col.appendChild(body);\n    grid.appendChild(col);\n  });\n}\n\nfunction updateCalDateLabel() {\n  const y = calDate.getFullYear();\n  const m = String(calDate.getMonth() + 1).padStart(2, '0');\n  const d = String(calDate.getDate()).padStart(2, '0');\n  const w = WEEKDAY_LABELS[calDate.getDay()];\n  document.getElementById('calDateLabel').textContent = `${y}/${m}/${d} (${w})`;\n}\n\nfunction changeCalDate(delta) {\n  calDate.setDate(calDate.getDate() + delta);\n  updateCalDateLabel();\n}\n\ndocument.addEventListener('DOMContentLoaded', () => {\n  updateCalDateLabel();\n  updateSearchDateLabel();\n  setTimeout(initScrollArrows, 100);\n  renderSearchTable();\n});\n\n// ── Hide past items & show empty state ──\nfunction filterPastItems() {\n  const today = new Date().toISOString().slice(0, 10);\n  document.querySelectorAll('.item-list').forEach(list => {\n    let futureCount = 0;\n    list.querySelectorAll('.item-row').forEach(row => {\n      const to = row.dataset.to || row.dataset.from || '';\n      if (to && to \u003c today) {\n        row.style.display = 'none';\n      } else {\n        row.style.display = '';\n        futureCount++;\n      }\n    });\n    // Show/hide empty state\n    let empty = list.querySelector('.item-list-empty');\n    if (futureCount === 0) {\n      if (!empty) {\n        empty = document.createElement('div');\n        empty.className = 'item-list-empty';\n        empty.textContent = '予定されている休業はありません';\n        list.appendChild(empty);\n      }\n      empty.style.display = '';\n    } else {\n      if (empty) empty.style.display = 'none';\n    }\n  });\n}\n\n// ── Calendar rendering ──\nconst hours = ['9:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];\n\n(function buildCalendar() {\n  const body = document.getElementById('calBody');\n  hours.forEach((h) => {\n    const row = document.createElement('div');\n    row.className = 'cal-row';\n    const tc = document.createElement('div');\n    tc.className = 'cal-time';\n    tc.textContent = h;\n    row.appendChild(tc);\n    for (let d = 0; d \u003c 7; d++) {\n      const cell = document.createElement('div');\n      const hour = parseInt(h);\n      if (d === 3) {\n        cell.className = 'cal-cell closed';\n      } else if (hour === 12) {\n        cell.className = 'cal-cell lunch';\n      } else {\n        cell.className = 'cal-cell';\n      }\n      row.appendChild(cell);\n    }\n    body.appendChild(row);\n  });\n})();\n\n// ── Edit mode (kept for pattern loading) ──\nfunction startEdit() { document.body.classList.add('edit-mode'); }\nfunction saveEdit()  { document.body.classList.remove('edit-mode'); }\nfunction cancelEdit(){ document.body.classList.remove('edit-mode'); }\n\n// ── Per-row editing ──\nfunction showToast(msg) {\n  const t = document.getElementById('applyToast');\n  if (!t) return;\n  t.textContent = msg || '';\n  if (msg) t.classList.add('show');\n  else t.classList.remove('show');\n}\n\nfunction startRowEdit(btn) {\n  const row = btn.closest('.schedule-row');\n  // Save original values for cancel\n  row._origHtml = row.innerHTML;\n  row.classList.add('row-editing');\n  showToast('');\n}\nfunction saveRowEdit(btn) {\n  const row = btn.closest('.schedule-row');\n  row.classList.remove('row-editing');\n  const label = row.querySelector('.day-label').textContent.trim();\n  showRowSaveToast(label + 'を保存しました');\n}\nfunction cancelRowEdit(btn) {\n  const row = btn.closest('.schedule-row');\n  if (row && row._origHtml != null) {\n    row.innerHTML = row._origHtml;\n    row.classList.remove('row-editing');\n    delete row._origHtml;\n    return;\n  }\n  row.classList.remove('row-editing');\n}\n\nfunction showRowSaveToast(msg) {\n  const t = document.getElementById('applyToast');\n  t.textContent = msg;\n  t.classList.add('show');\n  setTimeout(() => t.classList.remove('show'), 2000);\n}\n\n// Inject per-row edit buttons（Figma バンドルは document 差し替え後にスクリプトが走るため DOMContentLoaded を待たない）\nfunction initScheduleUiInject() {\n  document.querySelectorAll('.schedule-row').forEach(row => {\n    if (row.querySelector('.row-edit-btn')) return;\n    const ctrl = document.createElement('div');\n    ctrl.className = 'row-edit-btn';\n    ctrl.innerHTML = `\n      \u003cbutton type=\"button\" class=\"btn-row-edit\" onclick=\"startRowEdit(this)\" title=\"この曜日を編集\">\n        \u003csvg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z\"/>\u003c/svg>\n        \u003cspan class=\"btn-row-edit-text\">編集\u003c/span>\n      \u003c/button>\n      \u003cbutton type=\"button\" class=\"btn-row-save\" onclick=\"saveRowEdit(this)\">保存\u003c/button>\n      \u003cbutton type=\"button\" class=\"btn-row-cancel\" onclick=\"cancelRowEdit(this)\">×\u003c/button>\n    `;\n    row.appendChild(ctrl);\n  });\n  // periods / renderPeriodNav はこの後に let 宣言されるため、同期呼び出しだと TDZ で落ちる\n  queueMicrotask(function () {\n    renderPeriodNav();\n    updateCalDateLabel();\n    filterPastItems();\n  });\n}\nif (document.readyState === 'loading') {\n  document.addEventListener('DOMContentLoaded', initScheduleUiInject);\n} else {\n  initScheduleUiInject();\n}\n\n// ── Period management ──\nlet periods = [\n  { id: 1, start: '2025-10-01', end: '2026-01-21' },\n  { id: 2, start: '2026-01-22', end: '2026-03-21' },\n  { id: 3, start: '2026-03-22', end: '2026-06-30' },\n];\nlet activePeriodIdx = 1; // show period ② by default (current)\nlet editingPeriodId = null;\nlet nextPeriodId = 4;\n\nconst NUM_LABELS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨'];\n\nfunction dateAddDay(dateStr, n) {\n  const d = new Date(dateStr);\n  d.setDate(d.getDate() + n);\n  return d.toISOString().slice(0, 10);\n}\nfunction fmtPeriodDate(str) {\n  const d = new Date(str);\n  const wd = ['日','月','火','水','木','金','土'];\n  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${wd[d.getDay()]}）`;\n}\n\nfunction renderPeriodNav() {\n  const today = new Date().toISOString().slice(0,10);\n  const p   = periods[activePeriodIdx];\n  const card = document.getElementById('periodNavCard');\n  const prev = document.getElementById('periodNavPrev');\n  const nextEl = document.getElementById('periodNavNext');\n\n  // prev button\n  prev.disabled = activePeriodIdx === 0;\n\n  // card\n  const isCurrent = today >= p.start && today \u003c= p.end;\n  card.innerHTML = `\n    \u003cspan class=\"period-nav-num\">${NUM_LABELS[activePeriodIdx]}\u003c/span>\n    \u003cspan class=\"period-nav-dates\">${fmtPeriodDate(p.start)} 〜 ${fmtPeriodDate(p.end)}\u003c/span>\n    ${isCurrent ? '\u003cspan class=\"period-nav-badge\">現在適用中\u003c/span>' : ''}\n    \u003cbutton class=\"btn-period-edit-inline\" onclick=\"openPeriodEdit(${p.id})\">日程編集\u003c/button>\n  `;\n\n  // next: show arrow or add button\n  const hasNext = activePeriodIdx \u003c periods.length - 1;\n  if (hasNext) {\n    nextEl.innerHTML = `\n      \u003cbutton class=\"period-nav-btn\" onclick=\"navPeriod(1)\">\n        \u003csvg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\u003cpolyline points=\"9 18 15 12 9 6\"/>\u003c/svg>\n      \u003c/button>`;\n  } else {\n    nextEl.innerHTML = `\n      \u003cbutton class=\"btn-period-add-inline\" onclick=\"addPeriod()\">\n        \u003csvg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\">\u003cline x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"/>\u003cline x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/>\u003c/svg>\n        期間を追加\n      \u003c/button>`;\n  }\n}\n\nfunction navPeriod(dir) {\n  activePeriodIdx = Math.max(0, Math.min(periods.length - 1, activePeriodIdx + dir));\n  closePeriodEdit();\n  renderPeriodNav();\n}\n\nfunction openPeriodEdit(id) {\n  editingPeriodId = id;\n  const idx = periods.findIndex(p => p.id === id);\n  const p   = periods[idx];\n  const panel = document.getElementById('periodEditPanel');\n  document.getElementById('periodEditStart').value = p.start;\n  document.getElementById('periodEditEnd').value   = p.end;\n  document.getElementById('periodEditStart').disabled = idx > 0;\n  const nextP = periods[idx + 1];\n  document.getElementById('periodEditHint').textContent = nextP\n    ? '終了日を変更すると次の期間の開始日が自動で更新されます'\n    : '最後の期間です。終了日を自由に設定できます';\n  const delBtn = document.getElementById('btnPeriodDelete');\n  delBtn.style.display = periods.length > 1 ? 'inline-flex' : 'none';\n  panel.classList.add('open');\n}\n\nfunction closePeriodEdit() {\n  document.getElementById('periodEditPanel').classList.remove('open');\n  editingPeriodId = null;\n}\n\nfunction savePeriodEdit() {\n  const idx = periods.findIndex(p => p.id === editingPeriodId);\n  const newStart = document.getElementById('periodEditStart').value;\n  const newEnd   = document.getElementById('periodEditEnd').value;\n  if (!newEnd || newEnd \u003c newStart) {\n    document.getElementById('periodEditEnd').style.borderColor = '#E8826A';\n    return;\n  }\n  document.getElementById('periodEditEnd').style.borderColor = '#ccc';\n  if (idx === 0) periods[idx].start = newStart;\n  periods[idx].end = newEnd;\n  if (periods[idx + 1]) {\n    periods[idx + 1].start = dateAddDay(newEnd, 1);\n    for (let i = idx + 1; i \u003c periods.length - 1; i++) {\n      if (periods[i].end \u003c= periods[i].start) periods[i].end = dateAddDay(periods[i].start, 30);\n      periods[i + 1].start = dateAddDay(periods[i].end, 1);\n    }\n  }\n  closePeriodEdit();\n  renderPeriodNav();\n  showRowSaveToast('適用期間を更新しました');\n}\n\nfunction addPeriod() {\n  const last = periods[periods.length - 1];\n  const newStart = dateAddDay(last.end, 1);\n  const newEnd   = dateAddDay(newStart, 89);\n  periods.push({ id: nextPeriodId++, start: newStart, end: newEnd });\n  activePeriodIdx = periods.length - 1;\n  renderPeriodNav();\n  openPeriodEdit(periods[activePeriodIdx].id);\n}\n\nfunction deletePeriod() {\n  if (periods.length \u003c= 1) return;\n  const idx = periods.findIndex(p => p.id === editingPeriodId);\n  periods.splice(idx, 1);\n  if (idx \u003c periods.length && idx > 0) periods[idx].start = dateAddDay(periods[idx-1].end, 1);\n  activePeriodIdx = Math.min(activePeriodIdx, periods.length - 1);\n  closePeriodEdit();\n  renderPeriodNav();\n}\n\n// ── Modal helpers ──\nfunction openModal(id) {\n  document.getElementById(id).classList.add('open');\n}\nfunction closeModal(id) {\n  document.getElementById(id).classList.remove('open');\n  editingRow = null;\n  if (id === 'clinicModal') document.querySelector('#clinicModal h3').textContent = '歯科医院の臨時休業を追加';\n  if (id === 'shiftModal') {\n    document.getElementById('shiftModalTitle').textContent = '衛生士の個別シフトを追加';\n    setShiftSegment('open');\n    setShiftMode('repeat');\n    document.querySelectorAll('#shiftDayPicker .day-btn').forEach(b => b.classList.remove('selected'));\n    document.querySelectorAll('input[name=\"shiftTimeType\"]')[0].checked = true;\n    document.getElementById('shiftTimeInputs').classList.add('hidden');\n  }\n}\ndocument.addEventListener('click', function(e) {\n  if (e.target.classList.contains('modal-overlay')) {\n    e.target.classList.remove('open');\n  }\n});\n\n// ── Inline edit ──\nlet editingRow = null;\n\nfunction editItem(btn) {\n  editingRow = btn.closest('.item-row');\n  const type = editingRow.dataset.type;\n  if (type === 'clinic') {\n    document.getElementById('clinicFrom').value = editingRow.dataset.from || '';\n    document.getElementById('clinicTo').value   = editingRow.dataset.to   || '';\n    document.getElementById('clinicMemo').value = editingRow.dataset.memo || '';\n    document.querySelector('#clinicModal h3').textContent = '歯科医院の臨時休業を編集';\n    openModal('clinicModal');\n  } else {\n    document.getElementById('shiftStaff').value = editingRow.dataset.staff || '';\n    const mode = editingRow.dataset.mode || 'single';\n    setShiftSegment(editingRow.dataset.segType || 'close');\n    setShiftMode(mode === 'single' ? 'date' : 'repeat');\n    if (mode === 'single') {\n      document.getElementById('shiftFrom').value = editingRow.dataset.from || '';\n      document.getElementById('shiftTo').value   = editingRow.dataset.to   || '';\n    } else {\n      document.getElementById('repeatFrom').value = editingRow.dataset.from || '';\n      document.getElementById('repeatTo').value   = editingRow.dataset.to   || '';\n      const days = (editingRow.dataset.days || '').split(',');\n      document.querySelectorAll('#shiftDayPicker .day-btn').forEach(b => {\n        b.classList.toggle('selected', days.includes(b.textContent));\n      });\n    }\n    if (editingRow.dataset.timeFrom) {\n      document.querySelectorAll('input[name=\"shiftTimeType\"]')[1].checked = true;\n      document.getElementById('shiftTimeInputs').classList.remove('hidden');\n      document.getElementById('shiftTimeFrom').value = editingRow.dataset.timeFrom;\n      document.getElementById('shiftTimeTo').value   = editingRow.dataset.timeTo;\n    }\n    document.getElementById('shiftModalTitle').textContent = '衛生士の個別シフトを編集';\n    openModal('shiftModal');\n  }\n}\n\n// ── Delete item ──\nfunction deleteItem(btn) {\n  if (confirm('この設定を削除しますか？')) {\n    const row = btn.closest('.item-row');\n    row.style.transition = 'opacity 0.2s';\n    row.style.opacity = '0';\n    setTimeout(() => { row.remove(); filterPastItems(); }, 200);\n  }\n}\n\n// ── 日付フォーマット ──\nconst WEEKDAYS = ['日','月','火','水','木','金','土'];\nfunction fmtDate(str) {\n  if (!str) return '';\n  const d = new Date(str);\n  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${WEEKDAYS[d.getDay()]}）`;\n}\n\n// ── 医院臨時休業を追加・更新 ──\nconst svgPen = '\u003csvg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z\"/>\u003c/svg>';\n\nfunction addClinicItem() {\n  const from = document.getElementById('clinicFrom').value;\n  const to   = document.getElementById('clinicTo').value;\n  const memo = document.getElementById('clinicMemo').value.trim();\n  if (!from || !to) { alert('休業期間を入力してください。'); return; }\n  const dateStr = from === to\n    ? fmtDate(from) + '　終日'\n    : fmtDate(from) + ' 〜 ' + fmtDate(to) + '　終日';\n\n  if (editingRow) {\n    editingRow.dataset.from = from;\n    editingRow.dataset.to   = to;\n    editingRow.dataset.memo = memo;\n    editingRow.querySelector('.item-date').textContent = dateStr;\n    editingRow.querySelector('.item-memo').textContent = memo || '—';\n    editingRow = null;\n  } else {\n    const row = document.createElement('div');\n    row.className = 'item-row';\n    row.dataset.type = 'clinic';\n    row.dataset.from = from; row.dataset.to = to; row.dataset.memo = memo;\n    row.innerHTML = `\n      \u003cspan class=\"item-tag clinic\">医院休業\u003c/span>\n      \u003cspan class=\"item-date\">${dateStr}\u003c/span>\n      \u003cspan class=\"item-memo\">${memo || '—'}\u003c/span>\n      \u003cbutton class=\"btn-edit-item\" onclick=\"editItem(this)\" title=\"編集\">${svgPen}\u003c/button>\n      \u003cbutton class=\"btn-delete\" onclick=\"deleteItem(this)\" title=\"削除\">🗑\u003c/button>\n    `;\n    document.getElementById('clinicList').appendChild(row);\n  }\n  document.getElementById('clinicMemo').value = '';\n  document.querySelector('#clinicModal h3').textContent = '歯科医院の臨時休業を追加';\n  closeModal('clinicModal');\n  filterPastItems();\n}\n\n// ── Shift modal: segment + mode ──\nlet shiftSegmentType = 'open'; // 'open' | 'close'\nlet shiftModeType = 'repeat';  // 'date' | 'repeat'\n\nfunction setShiftSegment(type) {\n  shiftSegmentType = type;\n  const isOpen = type === 'open';\n  document.getElementById('shiftSegOpen').classList.toggle('active', isOpen);\n  document.getElementById('shiftSegClose').classList.toggle('active', !isOpen);\n\n  const badge = document.getElementById('shiftInfoBadge');\n  badge.className = 'shift-info-badge ' + (isOpen ? 'open-badge' : 'close-badge');\n  document.getElementById('shiftInfoBadgeText').textContent = isOpen\n    ? '通常の定休日（木曜など）に、特定の期間だけ出勤日を追加します。予約枠が新たに開きます。'\n    : '通常の営業日に、特定の期間だけ休業日を設定します。既存の予約枠が閉じられます。';\n  document.getElementById('shiftSubmitBtn').textContent = isOpen ? '追加する' : '設定する';\n\n  // day picker selected color context\n  const picker = document.getElementById('shiftDayPicker');\n  picker.className = 'day-picker ' + (isOpen ? 'shift-mode-open' : 'shift-mode-close');\n}\n// Initialize picker class on load\ndocument.addEventListener('DOMContentLoaded', () => setShiftSegment('open'));\n\nfunction setShiftMode(mode) {\n  shiftModeType = mode;\n  const isRepeat = mode === 'repeat';\n  document.getElementById('shiftTabDate').classList.toggle('active', !isRepeat);\n  document.getElementById('shiftTabRepeat').classList.toggle('active', isRepeat);\n  document.getElementById('shiftPaneDate').classList.toggle('active', !isRepeat);\n  document.getElementById('shiftPaneRepeat').classList.toggle('active', isRepeat);\n}\n\nfunction toggleShiftTimeInput(radio) {\n  document.getElementById('shiftTimeInputs').classList.toggle('hidden', radio.value !== 'custom');\n}\n\n// legacy compat (editItem still calls switchShiftTab)\nfunction switchShiftTab(mode) {\n  setShiftMode(mode === 'single' ? 'date' : 'repeat');\n}\nfunction toggleShiftTime() {} // no-op, replaced\n\nfunction toggleDay(btn) {\n  btn.classList.toggle('selected');\n}\n\n// ── 衛生士シフトを追加・更新 ──\ndocument.addEventListener('DOMContentLoaded', function() {});\nfunction addShiftItem() {\n  const staff = document.getElementById('shiftStaff').value;\n  if (!staff) { alert('衛生士を選択してください。'); return; }\n\n  const segType = shiftSegmentType; // 'open' | 'close'\n  const mode    = shiftModeType;    // 'date' | 'repeat'\n  const timeType = document.querySelector('input[name=\"shiftTimeType\"]:checked').value;\n  const timeFrom = timeType === 'custom' ? document.getElementById('shiftTimeFrom').value : '';\n  const timeTo   = timeType === 'custom' ? document.getElementById('shiftTimeTo').value   : '';\n\n  const tagLabel  = segType === 'open' ? '出勤追加' : '個別シフト';\n  const tagClass  = segType === 'open' ? 'hygiene' : 'hygiene';\n\n  let dateStr, statusLabel, rowDataset = {};\n\n  if (mode === 'date') {\n    const from = document.getElementById('shiftFrom').value;\n    const to   = document.getElementById('shiftTo').value;\n    if (!from) { alert('期間を入力してください。'); return; }\n    statusLabel = timeType === 'custom' ? `${timeFrom}〜${timeTo} ${segType === 'open' ? '出勤' : '休業'}` : `終日${segType === 'open' ? '出勤' : '休業'}`;\n    dateStr = from === to ? fmtDate(from) : fmtDate(from) + ' 〜 ' + fmtDate(to);\n    rowDataset = { type:'shift', staff, from, to, segType, timeFrom, timeTo, mode:'single' };\n  } else {\n    const from = document.getElementById('repeatFrom').value;\n    const to   = document.getElementById('repeatTo').value;\n    const selectedDays = [...document.querySelectorAll('#shiftDayPicker .day-btn.selected')].map(b => b.textContent);\n    if (!from || selectedDays.length === 0) { alert('適用期間と曜日を選択してください。'); return; }\n    const dayStr = selectedDays.join('・');\n    statusLabel = timeType === 'custom'\n      ? `毎週 ${dayStr} ${timeFrom}〜${timeTo} ${segType === 'open' ? '出勤' : '休業'}`\n      : `毎週 ${dayStr} 終日${segType === 'open' ? '出勤' : '休業'}`;\n    dateStr = fmtDate(from) + ' 〜 ' + fmtDate(to) + '（繰り返し）';\n    rowDataset = { type:'shift', staff, from, to, segType, timeFrom, timeTo, mode:'repeat', days: selectedDays.join(',') };\n  }\n\n  if (editingRow) {\n    Object.assign(editingRow.dataset, rowDataset);\n    editingRow.querySelector('.item-name').textContent   = staff;\n    editingRow.querySelector('.item-date').textContent   = dateStr;\n    editingRow.querySelector('.item-status').textContent = statusLabel;\n    editingRow = null;\n  } else {\n    const row = document.createElement('div');\n    row.className = 'item-row';\n    Object.assign(row.dataset, rowDataset);\n    row.innerHTML = `\n      \u003cspan class=\"item-tag ${tagClass}\">${tagLabel}\u003c/span>\n      \u003cspan class=\"item-name\">${staff}\u003c/span>\n      \u003cspan class=\"item-date\">${dateStr}\u003c/span>\n      \u003cspan class=\"item-status\">${statusLabel}\u003c/span>\n      \u003cbutton class=\"btn-edit-item\" onclick=\"editItem(this)\" title=\"編集\">${svgPen}\u003c/button>\n      \u003cbutton class=\"btn-delete\" onclick=\"deleteItem(this)\" title=\"削除\">🗑\u003c/button>\n    `;\n    document.getElementById('shiftList').appendChild(row);\n  }\n  document.getElementById('shiftModalTitle').textContent = '衛生士の個別シフトを追加';\n  closeModal('shiftModal');\n  filterPastItems();\n}\n\n// ── Add/remove break row ──\nfunction addBreak(btn) {\n  const breakGroup = btn.closest('.break-group');\n  // すでに2つある場合は追加しない\n  if (breakGroup.querySelectorAll('.break-row').length >= 2) return;\n\n  // +ボタンを非表示にする\n  btn.style.display = 'none';\n\n  // 2つ目の休憩行を生成\n  const newRow = document.createElement('div');\n  newRow.className = 'break-row';\n  newRow.innerHTML = `\n    \u003cfieldset class=\"fl-group fl-time\">\u003clegend>休憩開始\u003c/legend>\u003cinput type=\"time\" value=\"\">\u003c/fieldset>\n    \u003cspan class=\"time-sep\">〜\u003c/span>\n    \u003cfieldset class=\"fl-group fl-time\">\u003clegend>休憩終了\u003c/legend>\u003cinput type=\"time\" value=\"\">\u003c/fieldset>\n    \u003cbutton class=\"btn-remove-break\" title=\"この休憩を削除\" onclick=\"removeBreak(this)\">×\u003c/button>\n  `;\n  breakGroup.appendChild(newRow);\n}\n\nfunction removeBreak(btn) {\n  const breakGroup = btn.closest('.break-group');\n  btn.closest('.break-row').remove();\n  // +ボタンを再表示\n  const addBtn = breakGroup.querySelector('.btn-add-break');\n  if (addBtn) addBtn.style.display = '';\n}\n\nfunction saveInlinePattern() {\n  const input = document.getElementById('inlinePatternName');\n  const name = input.value.trim();\n  if (!name) { input.focus(); input.style.borderColor = '#E8826A'; return; }\n  input.style.borderColor = '';\n\n  const today = new Date();\n  const dateStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;\n  const icons = ['📋','⭐','🗓','📌','🔖'];\n  const icon = icons[PATTERNS.length % icons.length];\n  const newId = Date.now();\n  PATTERNS.push({ id: newId, icon, name, meta: '現在の設定', date: dateStr });\n\n  // モーダル側リストにも追加\n  const list = document.getElementById('patternList');\n  const card = document.createElement('div');\n  card.className = 'pattern-card';\n  card.dataset.id = newId;\n  card.onclick = function(){ selectPattern(this); };\n  card.innerHTML = `\n    \u003cdiv class=\"pattern-icon\">${icon}\u003c/div>\n    \u003cdiv class=\"pattern-info\">\n      \u003cdiv class=\"pattern-name\">${name}\u003c/div>\n      \u003cdiv class=\"pattern-meta\">\u003cspan class=\"pattern-meta-item\">現在の設定\u003c/span>\u003c/div>\n    \u003c/div>\n    \u003cdiv class=\"pattern-date\">${dateStr} 保存\u003c/div>\n    \u003cdiv class=\"pattern-check\">\u003cdiv class=\"pattern-check-inner\">\u003c/div>\u003c/div>\n  `;\n  list.appendChild(card);\n  input.value = '';\n  document.getElementById('patternDropdownPanel').classList.remove('open');\n\n  const toast = document.getElementById('applyToast');\n  toast.textContent = '「' + name + '」としてパターンを保存しました';\n  toast.classList.add('show');\n  setTimeout(() => { toast.classList.remove('show'); toast.textContent = 'パターンを読み込みました'; }, 2400);\n}\n\n// ── パターンデータ ──\nconst PATTERNS = [\n  { id:1, icon:'🌸', name:'通常営業時間', meta:'月〜水・金〜日・祝 営業　木 休業　9:00〜18:00', date:'2025/10/01' },\n  { id:2, icon:'☀️', name:'夏時間（7〜8月）', meta:'月〜土 営業　日・祝 休業　8:30〜19:00', date:'2025/06/15' },\n  { id:3, icon:'❄️', name:'冬時間（12〜1月）', meta:'月〜金 営業　土・日・祝 休業　9:00〜17:30', date:'2024/11/20' },\n  { id:4, icon:'🎌', name:'GW・連休対応', meta:'月〜土 営業　日 休業　9:00〜17:00', date:'2024/04/28' },\n];\n\nfunction buildPatternDropdownList() {\n  const list = document.getElementById('patternDropdownList');\n  if (!list) return;\n  list.innerHTML = '';\n  if (PATTERNS.length === 0) {\n    list.innerHTML = '\u003cdiv style=\"padding:8px 14px; font-size:12px; color:#bbb;\">保存済みパターンがありません\u003c/div>';\n    return;\n  }\n  PATTERNS.forEach(p => {\n    const item = document.createElement('div');\n    item.className = 'pattern-dropdown-item';\n    item.innerHTML = `\n      \u003cspan class=\"pattern-dropdown-item-icon\">${p.icon}\u003c/span>\n      \u003cdiv class=\"pattern-dropdown-item-info\">\n        \u003cdiv class=\"pattern-dropdown-item-name\">${p.name}\u003c/div>\n        \u003cdiv class=\"pattern-dropdown-item-meta\">${p.meta}\u003c/div>\n      \u003c/div>\n      \u003cbutton class=\"pattern-dropdown-apply-btn\" onclick=\"applyDropdownPattern(${p.id}, event)\">適用\u003c/button>\n    `;\n    list.appendChild(item);\n  });\n}\n\nfunction togglePatternDropdown() {\n  const panel = document.getElementById('patternDropdownPanel');\n  const btn   = document.getElementById('patternDropdownBtn');\n  const isOpen = panel.classList.toggle('open');\n  if (isOpen) {\n    // ボタン位置に合わせてパネルを配置\n    const rect = btn.getBoundingClientRect();\n    panel.style.top  = (rect.bottom + 6) + 'px';\n    panel.style.left = rect.left + 'px';\n    buildPatternDropdownList();\n    setTimeout(() => {\n      document.addEventListener('click', closePatternDropdownOutside, { once: true });\n    }, 0);\n  }\n}\n\nfunction closePatternDropdownOutside(e) {\n  const panel = document.getElementById('patternDropdownPanel');\n  const btn   = document.getElementById('patternDropdownBtn');\n  if (panel && !panel.contains(e.target) && e.target !== btn) {\n    panel.classList.remove('open');\n  }\n}\n\nfunction applyDropdownPattern(id, e) {\n  e.stopPropagation();\n  const p = PATTERNS.find(x => x.id === id);\n  if (!p) return;\n  document.getElementById('patternDropdownPanel').classList.remove('open');\n  const toast = document.getElementById('applyToast');\n  toast.textContent = '「' + p.name + '」を読み込みました';\n  toast.classList.add('show');\n  setTimeout(() => { toast.classList.remove('show'); toast.textContent = 'パターンを読み込みました'; }, 2200);\n}\n\n// ── Pattern save ──\nfunction savePattern() {\n  const nameInput = document.querySelector('.pattern-name-input');\n  const name = nameInput.value.trim();\n  if (!name) { nameInput.focus(); nameInput.style.borderColor = '#E8826A'; return; }\n  nameInput.style.borderColor = '#ccc';\n  alert('「' + name + '」として設定を保存しました。');\n  nameInput.value = '';\n}\n\n\u003c/script>\n\n\n\u003c/body>\u003c/html>"
  </script>
